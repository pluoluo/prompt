worker_processes 1;
pid /home/sahn/prompt/nginx.pid;
error_log /home/sahn/prompt/nginx-error.log;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /home/sahn/prompt/nginx-access.log;

    sendfile on;
    tcp_nopush on;

    client_max_body_size 50m;
    client_body_temp_path /home/sahn/prompt/nginx-tmp;
    server {
        listen 8769;
        server_name _;

        root /home/sahn/prompt/frontend;
        index index.html;

        # 前端静态文件
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API 反向代理 - 解决跨域问题
        # 指定可写的临时目录，防止 /var/lib/nginx/proxy 权限问题导致响应截断
        proxy_temp_path /home/sahn/prompt/nginx-tmp;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        location /api/ {
            proxy_pass http://127.0.0.1:8768/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";
        }
    }
}
